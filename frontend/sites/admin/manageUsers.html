<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="products-page py-5">
    <div class="container">
      <div class="row mb-4 align-items-end">
        <div class="col">
          <h1 class="products-title mb-0">User Management</h1>
          <p class="hero-subtitle mb-0">
            View customer accounts, activate or deactivate users and inspect their order details.
          </p>
        </div>
      </div>

      <div id="user-message" class="alert" role="alert" style="display:none"></div>

      <div class="card shadow-sm border-0 rounded-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="bg-light">
                <tr class="cart-table-header">
                  <th class="ps-4 border-0">ID</th>
                  <th class="border-0">Name</th>
                  <th class="border-0">Username</th>
                  <th class="border-0">Email</th>
                  <th class="border-0">Role</th>
                  <th class="border-0">Status</th>
                  <th class="text-end pe-4 border-0">Actions</th>
                </tr>
              </thead>

              <tbody id="user-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="userOrdersModal" tabindex="-1" aria-labelledby="userOrdersModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content rounded-0">
        <div class="modal-header border-bottom">
          <h2 class="modal-title h5" id="userOrdersModalLabel">Customer Orders</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div id="modal-user-orders"></div>

          <div id="modal-order-details-wrapper" style="display:none">
            <hr class="my-4">
            <div id="modal-order-details"></div>
          </div>
        </div>

        <div class="modal-footer border-top">
          <button type="button" class="btn btn-outline-dark rounded-0" data-bs-dismiss="modal">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Template for dynamically rendered user rows -->
  <template id="user-row-template">
    <tr>
      <td class="ps-4 user-id"></td>
      <td class="user-name"></td>
      <td class="user-username"></td>
      <td class="user-email"></td>
      <td>
        <span class="badge rounded-0 py-2 px-3 bg-secondary user-role"></span>
      </td>
      <td>
        <span class="badge rounded-0 py-2 px-3 user-status"></span>
      </td>
      <td class="text-end pe-4">
        <button class="btn btn-outline-dark btn-sm rounded-0 view-orders-btn me-2">
          View Orders
        </button>

        <button class="btn btn-sm rounded-0 toggle-user-status-btn">
          Change status
        </button>
      </td>
    </tr>
  </template>

  <!-- Template for the customer orders table in the modal -->
  <template id="user-orders-table-template">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-3">Order</th>
            <th>Date</th>
            <th>Invoice</th>
            <th>Total</th>
            <th class="text-end pe-3">Action</th>
          </tr>
        </thead>
        <tbody class="user-orders-table-body"></tbody>
      </table>
    </div>
  </template>

  <!-- Template for dynamically rendered customer order rows -->
  <template id="user-order-row-template">
    <tr>
      <td class="ps-3 user-order-id"></td>
      <td class="user-order-date"></td>
      <td class="user-order-invoice"></td>
      <td class="user-order-total"></td>
      <td class="text-end pe-3">
        <button class="btn btn-outline-dark btn-sm rounded-0 view-order-details-btn">
          Details
        </button>
      </td>
    </tr>
  </template>

  <!-- Template for the order detail section in the modal -->
  <template id="user-order-details-template">
    <div class="mt-4">
      <h3 class="h5 mb-3 user-order-detail-title"></h3>

      <div class="row mb-3">
        <div class="col-md-6">
          <p class="mb-1">
            <strong>Customer:</strong>
            <span class="user-order-detail-customer"></span>
          </p>
          <p class="mb-1">
            <strong>Email:</strong>
            <span class="user-order-detail-email"></span>
          </p>
          <p class="mb-0">
            <strong>Address:</strong>
            <span class="user-order-detail-address"></span>
          </p>
        </div>

        <div class="col-md-6">
          <p class="mb-1">
            <strong>Invoice:</strong>
            <span class="user-order-detail-invoice"></span>
          </p>
          <p class="mb-1">
            <strong>Date:</strong>
            <span class="user-order-detail-date"></span>
          </p>
          <p class="mb-0">
            <strong>Total:</strong>
            <span class="user-order-detail-total"></span>
          </p>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light">
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Total</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody class="user-order-detail-items-body"></tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Template for dynamically rendered order detail item rows -->
  <template id="user-order-detail-item-row-template">
    <tr>
      <td class="user-order-item-name"></td>
      <td class="user-order-item-quantity"></td>
      <td class="user-order-item-unit-price"></td>
      <td class="user-order-item-total"></td>
      <td class="text-end">
        <button class="btn btn-outline-danger btn-sm rounded-0 remove-order-item-btn">
          Remove
        </button>
      </td>
    </tr>
  </template>

  <!-- Template shown when no orders exist for a customer -->
  <template id="user-orders-empty-template">
    <p class="mb-0">
      No orders found for <span class="user-orders-empty-name"></span>.
    </p>
  </template>

  <!-- Template shown when no visible products are left in an order -->
  <template id="user-order-detail-empty-row-template">
    <tr>
      <td colspan="5" class="text-muted">
        No visible products left in this order.
      </td>
    </tr>
  </template>

  <!-- Template shown while modal content is loading -->
  <template id="modal-loading-template">
    <p class="mb-0 modal-loading-message"></p>
  </template>

  <!-- Template shown when modal content cannot be loaded -->
  <template id="modal-error-template">
    <p class="text-danger modal-error-message"></p>
  </template>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="/itea/frontend/js/adminManageUsers.js"></script>
</body>

</html>
