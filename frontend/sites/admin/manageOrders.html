<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="products-page py-5">
    <div class="container">
      <div class="row mb-4 align-items-end">
        <div class="col">
          <h1 class="products-title mb-0">Order Management</h1>
          <p class="hero-subtitle mb-0">
            View all customer orders chronologically and edit order items.
          </p>
        </div>
      </div>

      <div id="order-message" class="alert" role="alert" style="display:none"></div>

      <div class="card shadow-sm border-0 rounded-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="bg-light">
                <tr class="cart-table-header">
                  <th class="ps-4 border-0">Order</th>
                  <th class="border-0">Date</th>
                  <th class="border-0">Customer</th>
                  <th class="border-0">Invoice Nr.</th>
                  <th class="border-0">Subtotal</th>
                  <th class="border-0">Voucher</th>
                  <th class="border-0">Total</th>
                  <th class="text-end pe-4 border-0">Action</th>
                </tr>
              </thead>

              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="orderDetailsModal" tabindex="-1" aria-labelledby="orderDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content rounded-0">
        <div class="modal-header border-bottom">
          <h2 class="modal-title h5" id="orderDetailsModalLabel">Order Details</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div id="modal-order-details"></div>
        </div>

        <div class="modal-footer border-top">
          <button type="button" class="btn btn-outline-dark rounded-0" data-bs-dismiss="modal">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Template for dynamically rendered order overview rows -->
  <template id="order-row-template">
    <tr>
      <td class="ps-4 order-id"></td>
      <td class="order-date"></td>
      <td>
        <span class="order-customer-name"></span>
        <div class="text-muted small order-customer-email"></div>
      </td>
      <td class="order-invoice"></td>
      <td class="order-subtotal"></td>
      <td class="order-voucher"></td>
      <td class="order-total"></td>
      <td class="text-end pe-4">
        <button class="btn btn-outline-dark btn-sm rounded-0 view-order-details-btn">
          Details
        </button>
      </td>
    </tr>
  </template>

  <!-- Template for the order detail modal content -->
  <template id="order-details-template">
    <div class="mb-4">
      <h3 class="h5 mb-3 order-detail-title"></h3>

      <div class="row mb-3">
        <div class="col-md-6">
          <p class="mb-1">
            <strong>Customer:</strong>
            <span class="order-detail-customer"></span>
          </p>
          <p class="mb-1">
            <strong>Email:</strong>
            <span class="order-detail-email"></span>
          </p>
          <p class="mb-0">
            <strong>Address:</strong>
            <span class="order-detail-address"></span>
          </p>
        </div>

        <div class="col-md-6">
          <p class="mb-1">
            <strong>Invoice:</strong>
            <span class="order-detail-invoice"></span>
          </p>
          <p class="mb-1">
            <strong>Date:</strong>
            <span class="order-detail-date"></span>
          </p>
          <p class="mb-0">
            <strong>Total:</strong>
            <span class="order-detail-total"></span>
          </p>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="bg-light">
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Total</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody class="order-detail-items-body"></tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Template for dynamically rendered order detail item rows -->
  <template id="order-detail-item-row-template">
    <tr>
      <td class="order-item-name"></td>
      <td class="order-item-quantity"></td>
      <td class="order-item-unit-price"></td>
      <td class="order-item-total"></td>
      <td class="text-end">
        <button class="btn btn-outline-danger btn-sm rounded-0 remove-order-item-btn">
          Remove product
        </button>
      </td>
    </tr>
  </template>

  <!-- Template shown when no visible products are left in an order -->
  <template id="order-detail-empty-row-template">
    <tr>
      <td colspan="5" class="text-muted">
        No visible products left in this order.
      </td>
    </tr>
  </template>

  <!-- Template shown while order details are loading -->
  <template id="order-details-loading-template">
    <p class="mb-0">Loading order details...</p>
  </template>

  <!-- Template shown when order details cannot be loaded -->
  <template id="order-details-error-template">
    <p class="text-danger order-details-error-message"></p>
  </template>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="/itea/frontend/js/adminManageOrders.js"></script>
</body>

</html>
