<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="products-page py-5">
    <div class="container">

      <div class="row mb-3">
        <div class="col">
          <h1 class="products-title mb-0">Manage Vouchers</h1>
        </div>
      </div>

      <div class="card shadow-sm border-0 rounded-0 mb-5">
        <div class="card-body p-4">
          <h5 class="fw-600 mb-4" style="letter-spacing: -0.02em;">Create New Voucher</h5>

          <form id="create-voucher-form" class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label small fw-600 text-uppercase" for="voucher-value">
                Amount (€)
              </label>
              <input
                type="number"
                id="voucher-value"
                step="0.01"
                class="form-control"
                placeholder="0.00"
                required>
            </div>

            <div class="col-md-4">
              <label class="form-label small fw-600 text-uppercase" for="voucher-valid-until">
                Expiry Date
              </label>
              <input
                type="date"
                id="voucher-valid-until"
                class="form-control"
                required>
            </div>

            <div class="col-md-4">
              <button type="submit" class="cart-voucher-button w-100">
                <i class="bi bi-plus-lg me-2"></i>Generate Voucher
              </button>
            </div>

            <div class="col-12">
              <div id="voucher-error" class="alert alert-danger rounded-0 mb-0 d-none"></div>
              <div id="voucher-success" class="alert alert-success rounded-0 mb-0 d-none"></div>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm border-0 rounded-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr class="voucher-table-header">
                  <th class="ps-4 border-0">Code</th>
                  <th class="border-0">Value</th>
                  <th class="border-0">Remaining Value</th>
                  <th class="border-0">Valid Until</th>
                  <th class="border-0">Claimed by User</th>
                  <th class="border-0">Status</th>
                </tr>
              </thead>

              <tbody id="voucher-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Template for dynamically rendered voucher rows -->
  <template id="voucher-row-template">
    <tr>
      <td class="ps-4 py-4">
        <code class="fw-600 voucher-code"></code>
      </td>
      <td>
        <span class="fw-600 voucher-value"></span>
      </td>
      <td>
        <span class="fw-600 voucher-remaining-value"></span>
      </td>
      <td>
        <span class="voucher-date"></span>
      </td>
      <td>
        <span class="voucher-assigned-user"></span>
      </td>
      <td>
        <span class="badge rounded-0 py-2 px-3 voucher-status"></span>
      </td>
    </tr>
  </template>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="/itea/frontend/js/voucher.js"></script>
</body>

</html>
