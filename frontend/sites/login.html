<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

  <script src="/itea/frontend/js/auth.js"></script>
  <script src="/itea/frontend/js/layout.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div
          id="registration-message"
          class="alert alert-success alert-dismissable show my-4 text-center"
          role="alert"
          style="display:none">
          Registration successful! Please log in.
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">

            <h1 class="h3 mb-4">Login</h1>

            <div id="login-message" class="alert" role="alert" style="display:none"></div>

            <form id="login-form" novalidate>
              <div class="mb-3">
                <label for="login-identifier" class="form-label">
                  Username or email
                </label>

                <input
                  type="text"
                  class="form-control"
                  id="login-identifier"
                  name="identifier"
                  required
                  autocomplete="username">

                <div class="invalid-feedback">
                  Please enter your username or email.
                </div>
              </div>

              <div class="mb-3">
                <label for="login-password" class="form-label">
                  Password
                </label>

                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="login-password"
                    name="password"
                    required
                    autocomplete="current-password">

                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    id="toggle-login-password"
                    aria-label="Show password">
                    Show
                  </button>

                  <div class="invalid-feedback">
                    Please enter your password.
                  </div>
                </div>
              </div>

              <div class="form-check mb-3">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="remember-login"
                  name="remember">

                <label class="form-check-label" for="remember-login">
                  Remember login
                </label>
              </div>

              <button type="submit" class="btn btn-success w-100">
                Login
              </button>
            </form>

            <p class="text-center mt-3 mb-0">
              No account yet?
              <a href="/itea/frontend/sites/register.html">
                Register here
              </a>
            </p>

          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

</body>

</html>
