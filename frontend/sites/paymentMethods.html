<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h1 class="h3 mb-1">
              Payment Methods
            </h1>

            <p class="text-muted mb-0">
              Manage your saved payment options
            </p>
          </div>
        </div>

        <!-- Error Display -->
        <div id="payment-error" class="alert alert-danger d-none"></div>

        <!-- Payment Method List -->
        <div id="payment-list" class="row g-3"></div>

        <!-- Add Payment Method Form -->
        <div class="card shadow-sm mt-5">
          <div class="card-body p-4">

            <h4 class="mb-4">
              Add Payment Method
            </h4>

            <form id="payment-form">
              <div class="mb-3">
                <label class="form-label" for="payment-type">
                  Payment Type
                </label>

                <select id="payment-type" class="form-select">
                  <option value="0">
                    Credit Card
                  </option>

                  <option value="1">
                    Bank Account
                  </option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label" for="payment-number">
                  Card Number / IBAN
                </label>

                <input
                  type="text"
                  id="payment-number"
                  class="form-control">
              </div>

              <div class="mb-4">
                <label class="form-label" for="payment-label">
                  Label
                </label>

                <input
                  type="text"
                  id="payment-label"
                  class="form-control"
                  placeholder="e.g. Personal Visa">
              </div>

              <button type="submit" class="btn btn-dark">
                Save Payment Method
              </button>
            </form>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Template shown when no payment methods exist -->
  <template id="payment-empty-template">
    <div class="col-12">
      <div class="alert alert-info mb-0">
        No payment methods saved yet.
      </div>
    </div>
  </template>

  <!-- Template for dynamically rendered payment method cards -->
  <template id="payment-method-card-template">
    <div class="col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
              <h5 class="mb-1 payment-label"></h5>
              <p class="text-muted mb-0 payment-type"></p>
            </div>

            <i class="bi fs-4 payment-icon"></i>
          </div>

          <div class="fw-semibold payment-number"></div>

          <button class="btn btn-outline-danger btn-sm mt-3 delete-payment">
            Remove
          </button>
        </div>
      </div>
    </div>
  </template>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="/itea/frontend/js/paymentMethods.js"></script>
</body>

</html>
