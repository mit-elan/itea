<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="card shadow-sm">
          <div class="card-body p-4">

            <div id="order-success" class="alert alert-success d-none">
              Order placed successfully!
            </div>

            <div id="order-error" class="alert alert-danger d-none"></div>

            <div id="order-content" class="d-none">

              <div class="mb-4">
                <h1 class="h3 mb-2">
                  Order Details
                </h1>

                <p class="text-muted mb-0">
                  Order #<span id="order-id"></span>
                </p>
              </div>

              <div class="row mb-4 g-4 align-items-start">

                <div class="col-md-3">
                  <div class="text-muted small fw-bold text-uppercase mb-1">
                    Date
                  </div>
                  <div id="order-date"></div>
                </div>

                <div class="col-md-3">
                  <div class="text-muted small fw-bold text-uppercase mb-1">
                    Invoice
                  </div>
                  <div class="d-flex align-items-center gap-2">
                    <span id="order-invoice"></span>
                    <button id="download-invoice" class="btn btn-outline-dark btn-sm">
                      <i class="bi bi-download"></i>
                    </button>
                  </div>
                </div>

                <div class="col-md-2 d-none" id="subtotal-heading">
                  <div class="text-muted small fw-bold text-uppercase mb-1">
                    Subtotal
                  </div>
                  <div id="order-subtotal"></div>
                </div>

                <div class="col-md-2 d-none" id="voucher-heading">
                  <div class="text-muted small fw-bold text-uppercase mb-1">
                    Voucher
                  </div>
                  <div id="order-voucher"></div>
                </div>

                <div class="col-md-2">
                  <div class="text-muted small fw-bold text-uppercase mb-1">
                    Total
                  </div>
                  <div id="order-total" class="fw-bold"></div>
                </div>

              </div>

              <hr class="my-4">

              <h5 class="mb-3">
                Ordered Products
              </h5>

              <div id="order-items"></div>

            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/itea/frontend/js/order-details.js"></script>
</body>

</html>
