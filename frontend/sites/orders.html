<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">

        <div class="card shadow-sm">
          <div class="card-body p-4">

            <h1 class="h3 mb-4">
              My Orders
            </h1>

            <div id="orders-error" class="alert alert-danger d-none"></div>

            <div id="orders-empty" class="alert alert-info d-none">
              <h5 class="mb-2">
                No orders yet
              </h5>

              <p class="mb-3">
                You have not placed any orders yet.
              </p>

              <a href="/itea/frontend/sites/products.html" class="btn btn-dark btn-sm">
                Browse Products
              </a>
            </div>

            <div id="orders-content" class="d-none">
              <div id="orders-list"></div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Template for dynamically rendered customer order cards -->
  <template id="order-card-template">
    <div class="card shadow-sm mb-4">
      <div class="card-body">

        <div class="d-flex justify-content-between align-items-start mb-3">
          <div>
            <h5 class="mb-1">
              Order #<span class="order-id"></span>
            </h5>

            <p class="text-muted mb-0">
              Placed on <span class="order-date"></span>
            </p>
          </div>

          <span class="badge text-bg-success">
            Ordered
          </span>
        </div>

        <div class="mb-3">
          <strong>Total:</strong>
          <span class="order-total"></span>
        </div>

        <div class="mb-4">
          <strong>Invoice:</strong>
          <span class="order-invoice"></span>
        </div>

        <div class="d-flex gap-2">
          <a href="#" class="btn btn-dark btn-sm view-order-link">
            View Order
          </a>

          <button class="btn btn-outline-secondary btn-sm" disabled>
            Track Parcel
          </button>
        </div>

      </div>
    </div>
  </template>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="/itea/frontend/js/orders.js"></script>
</body>

</html>
