<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTEA Webshop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/itea/frontend/assets/css/style.css?v=33">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>

<body>
  <div id="nav-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow-sm">
          <div class="card-body p-4">

            <h1 class="h3 mb-4">My Account</h1>

            <div id="account-error" class="alert alert-danger d-none"></div>

            <div id="account-success" class="alert alert-success d-none"></div>

            <div id="account-content" class="d-none">
              <form id="account-form" novalidate>

                <div class="mb-3">
                  <label class="form-label" for="account-firstname">
                    First Name
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="account-firstname"
                    required>
                  <div class="invalid-feedback">
                    Please enter your first name.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="account-lastname">
                    Last Name
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="account-lastname"
                    required>
                  <div class="invalid-feedback">
                    Please enter your last name.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="account-email">
                    Email
                  </label>

                  <input
                    type="email"
                    class="form-control"
                    id="account-email"
                    required>
                  <div class="invalid-feedback">
                    Please enter a valid email address.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="account-address">
                    Address
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="account-address">
                </div>

                <div class="mb-3">
                  <label class="form-label" for="account-zip">
                    ZIP
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="account-zip">
                </div>

                <div class="mb-3">
                  <label class="form-label" for="account-city">
                    City
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    id="account-city">
                </div>

                <div class="mb-4">
                  <label class="form-label" for="account-password">
                    Enter your current password to save changes
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="account-password"
                    required>
                  <div class="invalid-feedback">
                    Please enter your password.
                  </div>
                </div>

                <button type="submit" class="btn btn-dark">
                  Save Changes
                </button>

              </form>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/itea/frontend/js/auth.js?v=5"></script>
  <script src="/itea/frontend/js/layout.js"></script>
  <script src="/itea/frontend/js/account.js"></script>
</body>

</html>
